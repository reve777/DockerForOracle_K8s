<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Asset 我的資產</title>

    <!-- header fragment -->
    <th:block th:replace="~{./include/header :: headerContent}"></th:block>

    <!-- Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js" defer></script>

    <script th:inline="none">
        var session_investor_id = sessionStorage.getItem('investor_id') || -1;

        $(document).ready(function () {
            update();

            // 賣出按鈕
            $("#myTable").on("click", "tr td:nth-child(10)", function () {
                if (confirm("是否要賣出？")) {
                    var po_id = $(this).attr('po_id');
                    var po_amount = $(this).attr('po_amount');
                    var amount = prompt("請輸入賣出數量？", po_amount);
                    if (amount == null) return;
                    if (parseInt(amount) > po_amount) {
                        alert('賣出數量不可大於 ' + po_amount);
                        return;
                    }
                    $.ajax({
                        url: "/portfolio/order/sell/" + po_id + "/" + amount,
                        type: "GET",
                        success: function (response) {
                            update();
                            alert('成交回報: ' + response);
                            chart();
                        }
                    });
                }
            });

            // 買入按鈕
            $("#myTable").on("click", "tr td:nth-child(11)", function () {
                var tstock_id = $(this).attr('tstock_id');
                if (!tstock_id) return;
                if (confirm("是否要加碼買進？")) {
                    var amount = prompt("請輸入購買股數(請以1000股為單位)？", "1000");
                    if (amount == null) return;
                    if (parseInt(amount) % 1000 != 0) {
                        alert('請輸入1000的倍數(1張=1000股)');
                        return;
                    }
                    $.ajax({
                        url: "/portfolio/order/buy/" + tstock_id + "/" + amount,
                        type: "GET",
                        success: function (response) {
                            update();
                            alert('成交回報: ' + response);
                            chart();
                        }
                    });
                }
            });
        });

        function update() {
            $.get("/portfolio/investor/" + session_investor_id, function (data) {
                $("#balance").text(numberFormat(data.balance));
                table_list(data.portfolios);
            });
        }

        function table_list(datas) {
            $("#myTable tbody > tr").remove();
            var profit_sum = 0;
            var asset_sum = 0;
            var foot_html = '<tr><td colspan="7" align="right">total</td><td nowrap="nowrap">{0}</td><td colspan="3"></td></tr>';
            sortJson(datas, 'id', true);

            $.each(datas, function (i, item) {
                var html = '<tr><td>{0}</td><td>{1}</td><td>{2}</td><td>{3}</td><td>{4}</td><td>{5}</td><td>{6}</td><td>{7}</td><td>{8}</td><td po_id="{9}" po_amount="{10}">{11}</td><td po_id="{12}" tstock_id="{13}">{14}</td></tr>';
                var profit = parseInt((item.tStock.price - item.cost) * item.amount);
                profit_sum += profit;
                asset_sum += item.tStock.price * item.amount;
                var sellbtn_html = '<button type="button" class="btn btn-primary">賣出</button>';
                var buylbtn_html = '<button type="button" class="btn btn-success">加碼</button>';

                $('#myTable').append(String.format(html,
                    item.id,
                    item.tStock.classify.name,
                    item.tStock.symbol,
                    item.tStock.name,
                    item.tStock.price,
                    item.cost,
                    numberFormat(item.amount),
                    numberFormat(profit),
                    getYMDHMS(item.date),
                    item.id,
                    item.amount,
                    sellbtn_html,
                    item.id,
                    item.tStock.id,
                    buylbtn_html
                ));
            });
            $('#myTable').append(String.format(foot_html, numberFormat(profit_sum)));
            $("#asset").text(numberFormat(asset_sum));
        }

        google.charts.load('current', {'packages': ['corechart']});
        google.charts.setOnLoadCallback(chart);

        function chart() {
            $("#piechart_asset").empty();
            $("#barchart_profit").empty();

            $.get("/portfolio/chart/asset/" + session_investor_id, function (datas) {
                if (datas && datas.length > 0) drawAssetChart(datas);
            });

            $.get("/portfolio/chart/profit/" + session_investor_id, function (datas) {
                if (datas && datas.length > 0) drawProfitChart(datas);
            });
        }

        function drawAssetChart(datas) {
            var data = [['Classify', 'AssetValue']];
            datas.forEach(function(d) { data.push([d.name, d.subtotal]); });
            var chartdata = google.visualization.arrayToDataTable(data);
            var options = { title: '資產配置', chartArea: { left: 0 }, height: 400 };
            new google.visualization.PieChart(document.getElementById('piechart_asset')).draw(chartdata, options);
        }

        function drawProfitChart(datas) {
            var data = [['Classify', 'Balance(NTD)']];
            datas.forEach(function(d) { data.push([d.name, d.subtotal]); });
            var chartdata = google.visualization.arrayToDataTable(data);
            var options = { title: '資產損益', chartArea: { left: 0 }, height: 400 };
            new google.visualization.BarChart(document.getElementById('barchart_profit')).draw(chartdata, options);
        }
    </script>
</head>
<body>
    <!-- navbar fragment -->
    <th:block th:replace="~{./include/navbar :: navbar}"></th:block>

    <div class="container mt-4">
        <div>
            <h1>Asset $<span id="asset">0</span></h1>
            <h2>Balance $<span id="balance">0</span></h2>
        </div>
        <table class="table table-striped table-responsive-md">
            <tr>
                <td valign="top">
                    <fieldset>
                        <legend><h2>投資組合</h2></legend>
                        <table id="myTable" class="table table-striped table-responsive-md">
                            <thead>
                                <tr>
                                    <th>id</th>
                                    <th>classify</th>
                                    <th>symbol</th>
                                    <th>name</th>
                                    <th>price</th>
                                    <th>cost</th>
                                    <th>amount</th>
                                    <th>profit</th>
                                    <th>date</th>
                                    <th>sell</th>
                                    <th>buy</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </fieldset>
                    <div class="row mt-4">
                        <div class="col-md-6">
                            <div id="piechart_asset" style="width:100%; height:400px;"></div>
                        </div>
                        <div class="col-md-6">
                            <div id="barchart_profit" style="width:100%; height:400px;"></div>
                        </div>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <!-- footer fragment -->
    <th:block th:replace="~{./include/footer :: footer}"></th:block>
</body>
</html>
