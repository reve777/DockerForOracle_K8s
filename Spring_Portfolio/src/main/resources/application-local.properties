# ==========================================
# Local Environment (Oracle 21c)
# ==========================================
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
spring.datasource.username=ivan
spring.datasource.password=1234
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# 增加 Hikari 連線池大小
spring.datasource.hikari.maximum-pool-size=200
# 延長等待連線的超時時間 (毫秒)
spring.datasource.hikari.connection-timeout=30000

spring.redis.enabled=false

logging.level.com.portfolio=DEBUG

# 綠界測試環境 (MerchantID: 2000132)
ecpay.merchantId=2000132
ecpay.hashKey=5294y06JbCWpE5v5
ecpay.hashIv=v77hoKGq4kWxJtE1

ecpay.url=https://payment-stage.ecpay.com.tw/Cashier/AioCheckOut
ecpay.returnUrl=http://localhost:8084/portfolio/ecpay/callback
ecpay.orderResultUrl=http://localhost:8084/portfolio/pay-result


# =============================Kafka=========================================
# 1. 核心連線設定
spring.kafka.bootstrap-servers=localhost:9092

# 2. Producer (生產者) 設定
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.enable.idempotence=true

# 3. Consumer (消費者) 設定
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# 👉 關鍵修正：將主反序列化器設為 ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# 👉 關鍵修正：指定委派的實際處理器為 JsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# 👉 關鍵修正：信任你的 DTO 所在的 Package ( com.portfolio.* )
spring.kafka.consumer.properties.spring.json.trusted.packages=com.portfolio.*

# 4. Listener (監聽器) 進階設定
spring.kafka.listener.ack-mode=RECORD
spring.kafka.listener.concurrency=3


logging.level.org.springframework.kafka=DEBUG
logging.level.org.apache.kafka=INFO
