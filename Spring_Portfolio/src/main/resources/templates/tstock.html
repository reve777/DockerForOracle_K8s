<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title> TStock 股票、指數、匯率管理系統</title>

<th:block th:replace="~{./include/header :: headerContent}"></th:block>

<script th:inline="javascript">
/*<![CDATA[*/

/**
 * 將表單資料轉為 JSON 物件
 */
$.fn.serializeObject = function () {
    var o = {};
    var a = this.serializeArray();
    $.each(a, function () {
        if (o[this.name]) {
            if (!o[this.name].push) o[this.name] = [o[this.name]];
            o[this.name].push(this.value || '');
        } else {
            o[this.name] = this.value || '';
        }
    });
    return o;
};

$(document).ready(function () {

    // CSRF 全域設定
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    $(document).ajaxSend(function(e, xhr, options) {
        if (header && token) {
            xhr.setRequestHeader(header, token);
        }
    });

    // 1. 點擊表格列載入資料
    $("#myTable").on("click", "tr", function () {
        var id = $(this).find('td').eq(0).text().trim();
        if(!id) return;

        $.get("/portfolio/tstock/" + id, function (res) {
            if (Number(res.code) === 200) {
                $('#add').attr('disabled', true);
                $('#upt, #del').attr('disabled', false);

                var data = res.data;
                $("#id").val(data.id);
                $("#name").val(data.name);
                $("#symbol").val(data.symbol);
                $("#classify_id").val(data.classify.id);
            } else {
                alert("取得資料失敗：" + res.message);
            }
        });
    });

    // 2. 按鈕事件
    $("#add").on("click", function () { sendAjax("POST", "/portfolio/tstock/"); });
    $("#upt").on("click", function () { sendAjax("PUT", "/portfolio/tstock/" + $("#id").val()); });
    $("#del").on("click", function () { 
        if(confirm("確定要刪除嗎？")) {
            sendAjax("DELETE", "/portfolio/tstock/" + $("#id").val()); 
        }
    });
    $("#rst").on("click", function() { initPageSetup(); });

    // 💡 載入 Classify 下拉選單 (同步改為 res.data)
    $.get("/portfolio/classify/", function (res) {
        if (Number(res.code) === 200) {
            var $select = $('#classify_id');
            $select.empty();
            $select.append('<option value="">-- 請選擇分類 --</option>');
            res.data.forEach(function (data) {
                $select.append('<option value="' + data.id + '">' + data.name + '</option>');
            });
        }
    });

    initPageSetup();
});

/**
 * 通用的 Ajax 傳送函式
 */
function sendAjax(type, url) {
    var jsonObj = $('#myform').serializeObject();
    $.ajax({
        url: url,
        type: type,
        contentType: "application/json; charset=utf-8",
        data: JSON.stringify(jsonObj),
        success: function (res) { 
            if (Number(res.code) === 200) {
                initPageSetup(); 
            } else {
                alert("操作失敗：" + res.message);
            }
        },
        error: function(e){ 
            console.error(e);
            alert("系統錯誤或代號重複"); 
        }
    });
}

function initPageSetup() {
    $('#myform').trigger("reset");
    $("#id").val("");
    $('#add').attr('disabled', false);
    $('#upt, #del').attr('disabled', true);
    table_list();
}

/**
 * 載入列表 (同步改為 res.data)
 */
function table_list() {
    $.get("/portfolio/tstock/", function (res) {
        if (Number(res.code) !== 200) {
            console.error("無法載入列表: " + res.message);
            return;
        }

        var tbody = $("#myTable tbody");
        tbody.empty();
        res.data.forEach(function (item) {
            var html = '<tr>' +
                '<td class="fw-bold">' + item.id + '</td>' +
                '<td>' + item.name + '</td>' +
                '<td><code class="text-primary">' + item.symbol + '</code></td>' +
                '<td><span class="badge bg-info text-dark">' + item.classify.name + '</span></td>' +
                '</tr>';
            tbody.append(html);
        });
    });
}
/*]]>*/
</script>
</head>
<body class="bg-light">

<th:block th:replace="~{./include/navbar :: navbar}"></th:block>

<div class="container pt-5 mt-4 pb-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3"><img width="40" th:src="@{/images/stock.png}" class="me-2"/>TStock 商品管理</h1>
    </div>

    <div class="card shadow-sm border-0 mb-5">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0">基本資料編輯</h5>
        </div>
        <div class="card-body p-4">
            <form id="myform">
                <div class="row g-4">
                    <div class="col-md-2">
                        <label for="id" class="form-label fw-bold">ID</label>
                        <input id="id" name="id" readonly class="form-control bg-light" placeholder="自動生成"/>
                    </div>
                    <div class="col-md-5">
                        <label for="name" class="form-label fw-bold">商品名稱</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="請輸入名稱" required/>
                    </div>
                    <div class="col-md-5">
                        <label for="symbol" class="form-label fw-bold">商品代號</label>
                        <input type="text" id="symbol" name="symbol" class="form-control" placeholder="例如：2330.TW" required/>
                    </div>
                    <div class="col-md-12">
                        <label for="classify_id" class="form-label fw-bold">商品分類</label>
                        <select id="classify_id" name="classify_id" class="form-select" required></select>
                    </div>
                </div>

                <div class="mt-4 pt-2">
                    <button id="add" type="button" class="btn btn-success px-4 me-2">新增</button>
                    <button id="upt" type="button" class="btn btn-info text-white px-4 me-2">修改</button>
                    <button id="del" type="button" class="btn btn-danger px-4 me-2">刪除</button>
                    <button id="rst" type="button" class="btn btn-warning px-4">重置</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0">商品清單 (股票、指數、匯率)</h5>
        </div>
        <div class="table-responsive">
            <table id="myTable" class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr>
                        <th width="80">ID</th>
                        <th>商品名稱</th>
                        <th>商品代號</th>
                        <th>所屬分類</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{./include/footer :: footer}"></th:block>

</body>
</html>
