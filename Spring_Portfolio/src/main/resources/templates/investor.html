<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Investor 投資人管理系統</title>

<th:block th:replace="~{./include/header :: headerContent}"></th:block>

<script th:inline="javascript">
/*<![CDATA[*/

/**
 * 將表單資料轉為 JSON 物件
 */
$.fn.serializeObject = function () {
    var o = {};
    var a = this.serializeArray();
    $.each(a, function () {
        if (o[this.name]) {
            if (!o[this.name].push) o[this.name] = [o[this.name]];
            o[this.name].push(this.value || '');
        } else {
            o[this.name] = ($(this).attr('type') === 'checkbox') ? $(this).is(':checked') : (this.value || '');
        }
    });
    return o;
};

// 💡 取得當前登入者的 investor_id
var session_investor_id = /*[[${session.investor_id}]]*/ null;

$(document).ready(function () {
    
    // 💡 補上 CSRF 全域設定
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    $(document).ajaxSend(function(e, xhr, options) {
        if (header && token) {
            xhr.setRequestHeader(header, token);
        }
    });

    // 1. 點擊表格列載入資料到表單 (已修正包裝路徑與型態判斷)
    $("#myTable").on("click", "tr", function () {
        var id = $(this).find('td').eq(0).text().trim();
        if (!id) return;

        $.get("/portfolio/investor/" + id, function (res) {
            // 💡 使用 Number() 確保字串 "200" 也能正確通過嚴格比較
            if (Number(res.code) === 200) {
                $('#add').attr('disabled', true);
                $('#upt, #del').attr('disabled', false);
                
                var investor = res.data;
                $("#id").val(investor.id);
                $("#username").val(investor.username);
                $("#email").val(investor.email);
                $("#balance").val(investor.balance);
            } else {
                alert("取得資料失敗：" + res.message);
            }
        });
    });

    // 2. 新增、修改、刪除按鈕事件
    $("#add").on("click", function () { sendAjax("POST", "/portfolio/investor/"); });
    $("#upt").on("click", function () { sendAjax("PUT", "/portfolio/investor/" + $("#id").val()); });
    $("#del").on("click", function () { 
        if(confirm("確定要刪除此投資人嗎？")) {
            sendAjax("DELETE", "/portfolio/investor/" + $("#id").val()); 
        }
    });
    
    // 3. 重置按鈕
    $("#rst").on("click", function() { initPageSetup(); });

    // 4. 切換投資人身份按鈕
    $("#myTable").on("click", ".login-btn", function(e) {
        e.stopPropagation();
        var investor_id = $(this).attr('data-investor-id');
        window.location.href = '/portfolio/page/investor?investor_id=' + investor_id;
    });

    // 5. Excel 匯出按鈕
    $("#exportExcel").on("click", function () {
        window.location.href = "/portfolio/investor/export";
    });

    initPageSetup();
});

/**
 * 通用的 Ajax 傳送函式 (已加上型態強制轉型)
 */
function sendAjax(type, url) {
    var jsonObj = $('#myform').serializeObject();
    $.ajax({
        url: url,
        type: type,
        contentType: "application/json; charset=utf-8",
        data: JSON.stringify(jsonObj),
        success: function (res) { 
            if (Number(res.code) === 200) {
                initPageSetup(); 
            } else {
                alert("操作失敗：" + res.message);
            }
        },
        error: function(e){ 
            console.error(e);
            alert("系統錯誤，狀態碼：" + e.status); 
        }
    });
}

/**
 * 初始化表單與表格
 */
function initPageSetup() {
    $('#myform').trigger("reset");
    $("#id").val(""); 
    $('#add').attr('disabled', false);
    $('#upt, #del').attr('disabled', true);
    table_list();
}

/**
 * 載入投資人列表 (已修正包裝路徑與型態判斷)
 */
function table_list() {
    $.get("/portfolio/investor/", function (res) {
        // 💡 這裡使用 Number() !== 200 避免將成功訊息誤判為錯誤
        if (Number(res.code) !== 200) {
            console.error("無法載入列表 (Code: " + res.code + "): " + res.message);
            return;
        }

        var tbody = $("#myTable tbody");
        tbody.empty();

        var datas = res.data;

        $.each(datas, function (i, item) {
            var loginBtnHtml = '';
            if (session_investor_id == item.id) {
                loginBtnHtml = '<span class="badge bg-primary px-3 py-2">當前帳戶</span>';
            } else {
                loginBtnHtml = '<button type="button" class="btn btn-outline-success btn-sm login-btn" data-investor-id="' + item.id + '">登入身份</button>';
            }

            var html = '<tr>' +
                '<td class="fw-bold">' + item.id + '</td>' +
                '<td>' + item.username + '</td>' +
                '<td>' + item.email + '</td>' +
                '<td>' + (item.balance ? item.balance.toLocaleString() : 0) + '</td>' +
                '<td class="text-center">' + loginBtnHtml + '</td>' +
                '</tr>';
            tbody.append(html);
        });
    });
}

/*]]>*/
</script>
</head>
<body class="bg-light">

<th:block th:replace="~{./include/navbar :: navbar}"></th:block>

<div class="container pt-5 mt-4 pb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3"><img width="40" th:src="@{/images/user.png}" class="me-2"/>Investor 投資人管理</h1>
        <button id="exportExcel" class="btn btn-outline-secondary">匯出 Excel</button>
    </div>

    <div class="card shadow-sm border-0 mb-5">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0">基本資料編輯</h5>
        </div>
        <div class="card-body p-4">
            <form id="myform">
                <div class="row g-4">
                    <div class="col-md-2">
                        <label for="id" class="form-label fw-bold">ID</label>
                        <input id="id" name="id" readonly class="form-control bg-light" placeholder="自動生成"/>
                    </div>
                    <div class="col-md-5">
                        <label for="username" class="form-label fw-bold">投資人帳號</label>
                        <input type="text" id="username" name="username" class="form-control" placeholder="請輸入帳號" required/>
                    </div>
                    <div class="col-md-5">
                        <label for="email" class="form-label fw-bold">電子郵件</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="example@mail.com"/>
                    </div>
                    <div class="col-md-12">
                        <label for="balance" class="form-label fw-bold">可用資金 (Balance)</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" id="balance" name="balance" class="form-control" placeholder="0.00"/>
                        </div>
                    </div>
                </div>

                <div class="mt-4 pt-2">
                    <button id="add" type="button" class="btn btn-success px-4 me-2">新增</button>
                    <button id="upt" type="button" class="btn btn-info text-white px-4 me-2">修改</button>
                    <button id="del" type="button" class="btn btn-danger px-4 me-2">刪除</button>
                    <button id="rst" type="button" class="btn btn-warning px-4">重置</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h5 class="card-title mb-0">投資人清單</h5>
        </div>
        <div class="table-responsive">
            <table id="myTable" class="table table-hover align-middle mb-0">
                <thead class="table-light text-secondary">
                    <tr>
                        <th width="80">ID</th>
                        <th>帳號 (Username)</th>
                        <th>電子郵件 (Email)</th>
                        <th>可用資金 (Balance)</th>
                        <th class="text-center" width="150">身份操作</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{./include/footer :: footer}"></th:block>

</body>
</html>
