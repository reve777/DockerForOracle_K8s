<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Kafka 訂單商品銷售統計</title>

<!-- 1. 載入你的共用 Header (包含 Bootstrap, jQuery, CSS 等) -->
<th:block th:replace="~{./include/header :: headerContent}"></th:block>

<!-- 2. 引入 Highcharts 核心檔案 -->
<script src="https://code.highcharts.com/highcharts.js"></script>

<style>
    /* 讓圖表自適應卡片寬度 */
    #container { width: 100%; height: 500px; margin: 0 auto; }
</style>

<script th:inline="javascript">
/*<![CDATA[*/
$(document).ready(function () {
    
    // CSRF 全域設定 (確保安全性一致)
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    $(document).ajaxSend(function(e, xhr, options) {
        if (header && token) {
            xhr.setRequestHeader(header, token);
        }
    });

    // 頁面載入時，初始化圖表
    loadChartData();

    // 綁定「重新整理」按鈕事件
    $("#refreshBtn").on("click", function() {
        loadChartData();
    });
});

/**
 * 取得 API 資料並渲染圖表
 */
 function loadChartData() {
     $.get('/portfolio/api/orders/chart-data', function(result) {
         // 根據你提供的 JSON 結構：
         // result.code 是 "200"
         // result.data.categories 是 商品名稱陣列
         // result.data.data 是 數值陣列
         
         if (result.code === "200" && result.data) {
             renderChart(result.data.categories, result.data.data);
         } else {
             console.error('後端回傳錯誤代碼:', result.code);
             alert("資料讀取失敗：" + result.message);
         }
     }).fail(function(error) {
         console.error('Error fetching data:', error);
         alert("無法取得圖表資料，請檢查網路或 API 路徑。");
     });
 }

/**
 * 渲染 Highcharts 長條圖
 */
function renderChart(categories, dataSeries) {
    Highcharts.chart('container', {
        chart: {
            type: 'column' // 長條圖
        },
        title: {
            text: '各商品銷售總數量'
        },
        xAxis: {
            categories: categories, // 商品名稱陣列
            crosshair: true
        },
        yAxis: {
            min: 0,
            title: {
                text: '銷售數量 (筆)'
            }
        },
        tooltip: {
            headerFormat: '<span style="font-size:10px">{point.key}</span><table>',
            pointFormat: '<tr><td style="color:{series.color};padding:0">{series.name}: </td>' +
                '<td style="padding:0"><b>{point.y} 筆</b></td></tr>',
            footerFormat: '</table>',
            shared: true,
            useHTML: true
        },
        plotOptions: {
            column: {
                pointPadding: 0.2,
                borderWidth: 0,
                dataLabels: {
                    enabled: true // 在柱子上直接顯示數字
                }
            }
        },
        series: [{
            name: '商品銷售量',
            data: dataSeries, // 數據陣列
            color: '#198754' // 換成 Bootstrap 的 success 綠色，搭配版面
        }]
    });
}
/*]]>*/
</script>
</head>
<body class="bg-light">

<!-- 3. 載入 Navbar -->
<th:block th:replace="~{./include/navbar :: navbar}"></th:block>

<div class="container pt-5 mt-4 pb-5">
    
    <!-- 套用與你前一頁相同的 Card 陰影樣式 -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
            <h1 class="h4 mb-0 fw-bold">Kafka 訂單商品銷售統計</h1>
            <!-- 新增重新整理按鈕 -->
            <button id="refreshBtn" class="btn btn-outline-success btn-sm px-3">
                重新整理圖表
            </button>
        </div>
        
        <div class="card-body p-4">
            <h5 class="text-center text-secondary mb-4">每 10 分鐘 Kafka 自動產生的訂單統計</h5>
            
            <!-- Highcharts 圖表容器 -->
            <div id="container"></div>
        </div>
    </div>

</div>

<!-- 4. 載入 Footer -->
<th:block th:replace="~{./include/footer :: footer}"></th:block>

</body>
</html>
