<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Asset 我的資產</title>

    <th:block th:replace="~{./include/header :: headerContent}"></th:block>

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script th:inline="javascript">
    /*<![CDATA[*/
        var session_investor_id = /*[[${session.investor_id}]]*/ -1;

        $(document).ready(function () {
            // CSRF 全域設定
            var token = $("meta[name='_csrf']").attr("content");
            var header = $("meta[name='_csrf_header']").attr("content");
            $(document).ajaxSend(function(e, xhr, options) {
                if (header && token) {
                    xhr.setRequestHeader(header, token);
                }
            });

            if (session_investor_id === -1) {
                alert("請先登入！");
                window.location.href = "/portfolio/login";
                return;
            }

            // 載入圖表庫並啟動更新
            if (typeof google !== 'undefined') {
                google.charts.load('current', {'packages': ['corechart']});
                google.charts.setOnLoadCallback(function() {
                    console.log("Google Charts 已就緒");
                    update(); 
                });
            } else {
                update(); 
            }

            // 每 60 秒刷新一次報價
            setInterval(refreshPrices, 60000);
        });

        // 刷新報價
        function refreshPrices() {
            fetch("/portfolio/price/refresh")
                .then(res => {
                    if (!res.ok) throw new Error("更新報價失敗");
                    return res.json();
                })
                .then(data => {
                    console.log("即時報價更新成功");
                    update(); 
                })
                .catch(err => console.error("自動刷新報價出錯:", err));
        }

        // 更新數據
        function update() {
            $.get("/portfolio/investor/" + session_investor_id, function (data) {
                $("#balance").text(numberFormat(data.balance));
                table_list(data.portfolios);
                // 直接將資料傳給 chart 函數進行前端計算
                chart(data.portfolios);
            });
        }

        // 渲染表格
        function table_list(datas) {
            var tbody = $("#myTable tbody");
            tbody.empty();
            var asset_sum = 0;

            if (!datas || datas.length === 0) {
                tbody.append('<tr><td colspan="11" class="text-center text-muted py-4">目前尚無持股數據</td></tr>');
                $("#asset").text("0");
                return;
            }

            $.each(datas, function (i, item) {
                var profit = parseInt((item.tStock.price - item.cost) * item.amount);
                asset_sum += item.tStock.price * item.amount;
                var profitClass = profit >= 0 ? 'text-danger' : 'text-success';

                var html = '<tr>' +
                    '<td>' + item.id + '</td>' +
                    '<td><span class="badge bg-light text-dark border">' + (item.tStock.classify ? item.tStock.classify.name : '未分類') + '</span></td>' +
                    '<td><code class="text-primary">' + item.tStock.symbol + '</code></td>' +
                    '<td class="fw-bold">' + item.tStock.name + '</td>' +
                    '<td>' + numberFormat(item.tStock.price) + '</td>' +
                    '<td>' + numberFormat(item.cost) + '</td>' +
                    '<td>' + numberFormat(item.amount) + '</td>' +
                    '<td class="' + profitClass + ' fw-bold">' + numberFormat(profit) + '</td>' +
                    '<td class="small text-muted">' + item.date + '</td>' +
                    '<td po_id="' + item.id + '"><button class="btn btn-outline-primary btn-sm sellBtn">賣出</button></td>' +
                    '<td tstock_id="' + item.tStock.id + '"><button class="btn btn-outline-success btn-sm buyBtn">加碼</button></td>' +
                    '</tr>';
                tbody.append(html);
            });
            $("#asset").text(numberFormat(asset_sum));
        }

        // 圖表邏輯：改由前端計算，避免後端 SQL 錯誤
        function chart(portfolios) {
            if (typeof google === 'undefined' || !google.visualization || !portfolios || portfolios.length === 0) {
                return;
            }

            // 1. 資產配置比例 (Pie Chart)
            var assetMap = {};
            portfolios.forEach(function(item) {
                var catName = item.tStock.classify ? item.tStock.classify.name : '未分類';
                var marketValue = item.tStock.price * item.amount;
                assetMap[catName] = (assetMap[catName] || 0) + marketValue;
            });

            var assetDataArr = [ ['Category', 'Value'] ];
            for (var key in assetMap) {
                assetDataArr.push([key, assetMap[key]]);
            }
            drawAssetChart(assetDataArr);

            // 2. 個股損益狀態 (Bar Chart)
            var profitDataArr = [ ['Stock', 'Profit'] ];
            portfolios.forEach(function(item) {
                var profit = (item.tStock.price - item.cost) * item.amount;
                profitDataArr.push([item.tStock.name, profit]);
            });
            drawProfitChart(profitDataArr);
        }

        function drawAssetChart(dataArr) {
            var chartdata = google.visualization.arrayToDataTable(dataArr);
            var options = { 
                title: '資產配置比例 (依分類)', 
                pieHole: 0.4, 
                chartArea: {width: '90%', height: '80%'} 
            };
            new google.visualization.PieChart(document.getElementById('piechart_asset')).draw(chartdata, options);
        }

        function drawProfitChart(dataArr) {
            var chartdata = google.visualization.arrayToDataTable(dataArr);
            var options = { 
                title: '個股損益狀態 (金額)', 
                legend: { position: 'none' }, 
                chartArea: {width: '80%', height: '80%'} 
            };
            new google.visualization.BarChart(document.getElementById('barchart_profit')).draw(chartdata, options);
        }

        function numberFormat(n) {
            return n.toLocaleString('zh-TW');
        }
    /*]]>*/
    </script>
</head>
<body class="bg-light">

    <th:block th:replace="~{./include/navbar :: navbar}"></th:block>

    <div class="container pt-5 mt-4 pb-5">
        <div class="row mb-4 g-3">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-primary text-white">
                    <div class="card-body p-4">
                        <h6 class="text-white-50 uppercase fw-bold">總資產市值 (Asset)</h6>
                        <h1 class="display-5 fw-bold mb-0">$<span id="asset">0</span></h1>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-dark text-white">
                    <div class="card-body p-4">
                        <h6 class="text-white-50 uppercase fw-bold">可用餘額 (Balance)</h6>
                        <h1 class="display-5 fw-bold mb-0">$<span id="balance">0</span></h1>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-5">
            <div class="card-header bg-white py-3">
                <h5 class="card-title mb-0 fw-bold"><i class="bi bi-list-stars me-2 text-primary"></i>我的投資組合</h5>
            </div>
            <div class="table-responsive">
                <table id="myTable" class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th><th>分類</th><th>代號</th><th>名稱</th><th>現價</th>
                            <th>成本</th><th>股數</th><th>未實現損益</th><th>日期</th>
                            <th class="text-center">賣出</th><th class="text-center">加碼</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm p-3">
                    <div id="piechart_asset" style="width:100%; height:350px;"></div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm p-3">
                    <div id="barchart_profit" style="width:100%; height:350px;"></div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{./include/footer :: footer}"></th:block>

</body>
</html>
