<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>模擬銀行高併發交易系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .account-info { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: #e8f4f8; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2ecc71; }
        #message { margin-top: 20px; padding: 10px; border-radius: 5px; text-align: center; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h1>銀行轉帳系統</h1>
    
    <div class="account-info">
        <div>
            <strong>帳戶 A001 餘額:</strong>
            <span id="balanceA">載入中...</span>
        </div>
        <div>
            <strong>帳戶 A002 餘額:</strong>
            <span id="balanceB">載入中...</span>
        </div>
    </div>

    <div class="form-group">
        <label for="fromAccount">轉出帳號:</label>
        <input type="text" id="fromAccount" value="A001" placeholder="例如: A001">
    </div>
    <div class="form-group">
        <label for="toAccount">轉入帳號:</label>
        <input type="text" id="toAccount" value="A002" placeholder="例如: A002">
    </div>
    <div class="form-group">
        <label for="amount">轉帳金額:</label>
        <input type="number" id="amount" value="1000" min="1" step="0.01">
    </div>

    <button onclick="executeTransfer()">確認轉帳</button>

    <div id="message"></div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8084/portfolio/api/bank';

    // 取得並更新餘額
    async function fetchBalances() {
        try {
            const resA = await fetch(`${API_BASE_URL}/balance/A001`);
            const dataA = await resA.json();
            if(dataA.success) document.getElementById('balanceA').innerText = `$${dataA.data.toFixed(2)}`;

            const resB = await fetch(`${API_BASE_URL}/balance/A002`);
            const dataB = await resB.json();
            if(dataB.success) document.getElementById('balanceB').innerText = `$${dataB.data.toFixed(2)}`;
        } catch (error) {
            console.error('無法連線到伺服器獲取餘額', error);
        }
    }

    // 執行轉帳
    async function executeTransfer() {
        const fromAccount = document.getElementById('fromAccount').value;
        const toAccount = document.getElementById('toAccount').value;
        const amount = document.getElementById('amount').value;
        const msgDiv = document.getElementById('message');

        const csrfTokenMeta = document.querySelector("meta[name='_csrf']");
        const csrfHeaderMeta = document.querySelector("meta[name='_csrf_header']");
        const fetchHeaders = { 'Content-Type': 'application/json' };
        
        if (csrfTokenMeta && csrfHeaderMeta) {
            fetchHeaders[csrfHeaderMeta.getAttribute("content")] = csrfTokenMeta.getAttribute("content");
        }

        try {
            const response = await fetch(`${API_BASE_URL}/transfer`, {
                method: 'POST',
                headers: fetchHeaders,
                body: JSON.stringify({
                    fromAccountId: fromAccount,
                    toAccountId: toAccount,
                    amount: parseFloat(amount)
                })
            });

            const result = await response.json();
            
            msgDiv.style.display = 'block';
            if (result.success) {
                msgDiv.className = 'success';
                msgDiv.innerText = result.message;
                fetchBalances(); // 轉帳成功後重新抓取餘額
            } else {
                msgDiv.className = 'error';
                msgDiv.innerText = result.message;
            }
        } catch (error) {
            msgDiv.style.display = 'block';
            msgDiv.className = 'error';
            msgDiv.innerText = '系統錯誤，無法連線到伺服器';
        }
    }

    // 頁面載入時先抓一次餘額
    window.onload = fetchBalances;
</script>

</body>
</html>
