<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Classify 商品分類管理</title>

<th:block th:replace="~{./include/header :: headerContent}"></th:block>

<script th:inline="javascript">
/*<![CDATA[*/

/**
 * 將表單資料轉為 JSON 物件
 */
$.fn.serializeObject = function () {
    var o = {};
    var a = this.serializeArray();
    $.each(a, function () {
        if (o[this.name]) {
            if (!o[this.name].push) o[this.name] = [o[this.name]];
            o[this.name].push(this.value || '');
        } else {
            o[this.name] = ($(this).attr('type') === 'checkbox') ? $(this).is(':checked') : (this.value || '');
        }
    });
    return o;
};

$(document).ready(function () {
    
    // CSRF 全域設定
    var token = $("meta[name='_csrf']").attr("content");
    var header = $("meta[name='_csrf_header']").attr("content");
    $(document).ajaxSend(function(e, xhr, options) {
        if (header && token) {
            xhr.setRequestHeader(header, token);
        }
    });

    // 1. 點擊表格列載入資料到表單
    $("#myTable").on("click", "tr", function () {
        var id = $(this).find('td').eq(0).text().trim();
        if (!id) return;

        $.get("/portfolio/classify/" + id, function (res) {
            if (Number(res.code) === 200) {
                $('#add').attr('disabled', true);
                $('#upt, #del').attr('disabled', false);
                
                var data = res.data;
                $("#id").val(data.id);
                $("#name").val(data.name);
                $("#tx").prop('checked', data.tx);
            } else {
                alert("取得資料失敗：" + res.message);
            }
        });
    });

    // 2. 按鈕事件
    $("#add").on("click", function () { sendAjax("POST", "/portfolio/classify/"); });
    $("#upt").on("click", function () { sendAjax("PUT", "/portfolio/classify/" + $("#id").val()); });
    $("#del").on("click", function () { 
        if(confirm("確定要刪除嗎？")) {
            sendAjax("DELETE", "/portfolio/classify/" + $("#id").val()); 
        }
    });
    $("#rst").on("click", function() { initPageSetup(); });

    initPageSetup();
});

/**
 * 通用的 Ajax 傳送函式
 */
function sendAjax(type, url) {
    var jsonObj = $('#myform').serializeObject();
    $.ajax({
        url: url,
        type: type,
        contentType: "application/json; charset=utf-8",
        data: JSON.stringify(jsonObj),
        success: function (res) { 
            if (Number(res.code) === 200) {
                initPageSetup(); 
            } else {
                alert("操作失敗：" + res.message);
            }
        },
        error: function(e){ 
            console.error(e);
            alert("系統錯誤"); 
        }
    });
}

function initPageSetup() {
    $('#myform').trigger("reset");
    $("#id").val(""); 
    $('#add').attr('disabled', false);
    $('#upt, #del').attr('disabled', true);
    table_list();
}

/**
 * 載入列表
 */
function table_list() {
    $.get("/portfolio/classify/", function (res) {
        if (Number(res.code) !== 200) {
            console.error("無法載入列表: " + res.message);
            return;
        }

        var tbody = $("#myTable tbody");
        tbody.empty();

        $.each(res.data, function (i, item) {
            var html = '<tr>' +
                '<td class="fw-bold">' + item.id + '</td>' +
                '<td>' + item.name + '</td>' +
                '<td>' + (item.tx ? '<span class="badge bg-success">是</span>' : '<span class="badge bg-secondary">否</span>') + '</td>' +
                '</tr>';
            tbody.append(html);
        });
    });
}

/*]]>*/
</script>
</head>
<body class="bg-light">

<th:block th:replace="~{./include/navbar :: navbar}"></th:block>

<div class="container pt-5 mt-4 pb-5">
    <div class="card shadow-sm border-0 mb-4">
        <div class="card-header bg-white py-3">
            <h1 class="h3 mb-0">Classify 商品分類管理</h1>
        </div>
        <div class="card-body p-4">
            <form id="myform">
                <div class="mb-3 row">
                    <label for="id" class="col-sm-2 col-form-label fw-bold">ID</label>
                    <div class="col-sm-4">
                        <input id="id" name="id" type="number" readonly class="form-control bg-light" placeholder="自動生成"/>
                    </div>
                </div>

                <div class="mb-3 row">
                    <label for="name" class="col-sm-2 col-form-label fw-bold">分類名稱</label>
                    <div class="col-sm-10">
                        <input id="name" name="name" type="text" placeholder="請輸入分類名稱 (例如: 股票、ETF)" class="form-control" required/>
                    </div>
                </div>

                <div class="mb-3 row">
                    <div class="col-sm-10 offset-sm-2">
                        <div class="form-check form-switch">
                            <input id="tx" name="tx" type="checkbox" class="form-check-input"/>
                            <label class="form-check-label fw-bold" for="tx">支援交易（TX）</label>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-sm-10 offset-sm-2">
                        <button id="add" type="button" class="btn btn-success px-4 me-2">新增</button>
                        <button id="upt" type="button" class="btn btn-info text-white px-4 me-2">修改</button>
                        <button id="del" type="button" class="btn btn-danger px-4 me-2">刪除</button>
                        <button id="rst" type="button" class="btn btn-warning px-4">重置</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white py-3">
            <h2 class="h5 mb-0">Classify 商品分類列表</h2>
        </div>
        <div class="table-responsive">
            <table id="myTable" class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th width="100">ID</th>
                        <th>分類名稱</th>
                        <th width="120">支援交易</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{./include/footer :: footer}"></th:block>

</body>
</html>
