server.port=8084
server.servlet.context-path=/portfolio
server.servlet.encoding.charset=UTF-8

# Spring Messages & Thymeleaf
spring.messages.basename=base,errors
spring.messages.encoding=UTF-8
spring.mvc.hiddenmethod.filter.enabled=true
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# ==========================================
# Oracle 21c XE Connection
# ==========================================
#spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/xepdb1
# 將 localhost 改為變數，預設值為 host.docker.internal (適用於 Windows/Mac Docker Desktop)
spring.datasource.url=jdbc:oracle:thin:@//oracle21c:1521/xepdb1
spring.datasource.username=system
spring.datasource.password=1234
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA 設定 (Hibernate 6 會自動偵測 Dialect，請勿手動指定舊版路徑)
spring.jpa.database=ORACLE
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# 解決時區與編碼的小工具 (HikariCP)
spring.datasource.hikari.connection-init-sql=ALTER SESSION SET TIME_ZONE='UTC'

# Spring 接受來自 Proxy 的標頭
server.forward-headers-strategy=native