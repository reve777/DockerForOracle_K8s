<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Watch List 觀測名單</title>

    <th:block th:replace="~{./include/header :: headerContent}"></th:block>

    <style>
        /* 表格與 UI 優化 */
        .table th, .table td { vertical-align: middle; }
        .table td.number-right, .table th.number-right { text-align: right; font-family: 'Courier New', monospace; }
        .table td.text-center, .table th.text-center { text-align: center; }
        .table td.symbol-cell { cursor: pointer; color: #0d6efd; font-weight: bold; }
        .table td.symbol-cell:hover { text-decoration: underline; }
        #container { border: 1px solid #dee2e6; border-radius: 8px; background-color: white; margin-top: 20px; }
        .buy-btn { font-weight: bold; }
    </style>

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script th:inline="javascript">
    /*<![CDATA[*/
        // 修正點：使用 /*[[...]]*/ 寫法並加上預設值 -1
        var session_watch_id = /*[[${session.watch_id}]]*/ -1; 

        $(document).ready(function () {
            // 1. CSRF Token 設定
            var token = $("meta[name='_csrf']").attr("content");
            var header = $("meta[name='_csrf_header']").attr("content");
            $(document).ajaxSend(function(e, xhr, options) {
                if (header && token) {
                    xhr.setRequestHeader(header, token);
                }
            });

            // 檢查 watch_id
            if (session_watch_id === -1) {
                console.warn("未找到觀測名單 ID");
            }

            // 2. 初始載入列表
            loadWatchList();

            // 3. 點擊代號查歷史走勢
            $("#myTable").on("click", ".symbol-cell", function () {
                var symbol = $(this).text();
                queryHistQuotes(symbol);
            });

            // 4. 買進下單邏輯
            $("#myTable").on("click", ".buy-btn", function () {
                var tstock_id = $(this).attr('tstock_id');
                var stockName = $(this).closest('tr').find('td:nth-child(2)').text();
                
                if (!tstock_id) return;

                if (confirm("是否要買進 " + stockName + "？")) {
                    let amount = prompt("請輸入購買股數 (請以1000股為單位)？", "1000");
                    if (amount === null) return; 
                    
                    let qty = parseInt(amount);
                    if (qty % 1000 !== 0 || isNaN(qty) || qty <= 0) {
                        alert('請輸入1000的倍數 (1張=1000股)');
                        return;
                    }

                    $.ajax({
                        url: "/portfolio/order/buy/" + tstock_id + "/" + qty,
                        type: "GET", 
                        success: function(response) {
                            alert('成交回報: ' + response);
                            if(confirm("下單成功！是否前往『我的資產』查看？")) {
                                window.location.href = "/portfolio/asset";
                            }
                        },
                        error: function(xhr) {
                            alert('下單失敗: ' + (xhr.responseText || '連線錯誤'));
                        }
                    });
                }
            });
        });

        function loadWatchList() {
            if (session_watch_id === -1) return;
            $.get("/portfolio/watch/" + session_watch_id, function (data) {
                var tbody = $("#myTable tbody");
                tbody.empty();
                
                var list = data.tStocks || data.tstocks || [];
                if (list.length === 0) {
                    tbody.append('<tr><td colspan="10" class="text-center text-muted py-4">目前名單內無股票</td></tr>');
                    return;
                }

                list.forEach(function(item) {
                    let tx_status = (item.classify && item.classify.tx);
                    let buybtn_html = tx_status ? 
                        `<button class="btn btn-success btn-sm buy-btn" tstock_id="${item.id}">下單</button>` : 
                        `<span class="badge bg-secondary">停止交易</span>`;
                    
                    let changeClass = item.changePrice >= 0 ? 'text-danger' : 'text-success';
                    
                    let html = `<tr>
                        <td class="text-center"><span class="badge bg-light text-dark border">${item.classify ? item.classify.name : '未分類'}</span></td>
                        <td class="fw-bold">${item.name}</td>
                        <td class="symbol-cell">${item.symbol}</td>
                        <td class="number-right">${item.preClosed}</td>
                        <td class="number-right text-primary fw-bold">${item.price}</td>
                        <td class="number-right ${changeClass}">${item.changePrice}</td>
                        <td class="number-right ${changeClass}">${item.changeInPercent}%</td>
                        <td class="number-right">${numberFormat(item.volume || item.volumn)}</td>
                        <td class="text-center small">${getYMDHMS(item.transactionDate)}</td>
                        <td class="text-center">${buybtn_html}</td>
                    </tr>`;
                    tbody.append(html);
                });

                if (list.length > 0) queryHistQuotes(list[0].symbol);
            });
        }

        function numberFormat(num) { return num ? num.toLocaleString('zh-TW') : '0'; }
        function getYMDHMS(dateStr) {
            if (!dateStr) return '';
            var dt = new Date(dateStr);
            return (dt.getMonth()+1) + '/' + dt.getDate() + ' ' + pad(dt.getHours()) + ':' + pad(dt.getMinutes());
        }
        function pad(num) { return num < 10 ? '0' + num : num; }

        google.charts.load('current', {packages: ['corechart']});

        function queryHistQuotes(symbol) {
            $.get("/portfolio/price/histquotes/" + symbol, function (quotes) {
                if (quotes && quotes.length > 0) {
                    drawChart(symbol, quotes);
                } else {
                    $("#container").html('<div class="p-5 text-center text-muted">暫無歷史數據</div>');
                }
            });
        }

        function drawChart(symbol, quotes) {
            var data = new google.visualization.DataTable();
            data.addColumn('string', 'Date');
            data.addColumn('number', 'Low');
            data.addColumn('number', 'Open');
            data.addColumn('number', 'Close');
            data.addColumn('number', 'High');

            quotes.forEach(function(item) {
                data.addRow([
                    item.date.substring(5),
                    parseFloat(item.low || 0),
                    parseFloat(item.open || 0),
                    parseFloat(item.close || 0),
                    parseFloat(item.high || 0)
                ]);
            });

            var options = {
                title: symbol + ' 歷史走勢 (日K)',
                legend: 'none',
                candlestick: {
                    fallingColor: { strokeWidth: 0, fill: '#198754' }, 
                    risingColor: { strokeWidth: 0, fill: '#dc3545' }   
                },
                chartArea: { left: '10%', width: '85%', height: '70%' }
            };

            new google.visualization.CandlestickChart(document.getElementById('container')).draw(data, options);
        }
    /*]]>*/
    </script>
</head>

<body class="bg-light">
    <th:block th:replace="~{./include/navbar :: navbar}"></th:block>

    <div class="container pt-5 mt-4 pb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-dark">Watch List 觀測名單</h2>
            <button class="btn btn-outline-secondary btn-sm" onclick="loadWatchList()">手動刷新</button>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="table-responsive">
                <table id="myTable" class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="text-center">分類</th>
                            <th>名稱</th>
                            <th>代號</th>
                            <th class="number-right">昨收</th>
                            <th class="number-right">報價</th>
                            <th class="number-right">漲跌</th>
                            <th class="number-right">漲跌幅</th>
                            <th class="number-right">交易量</th>
                            <th class="text-center">交易時間</th>
                            <th class="text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div class="card border-0 shadow-sm p-3">
            <div id="container" style="width:100%; height:450px;"></div>
        </div>
    </div>

    <th:block th:replace="~{./include/footer :: footer}"></th:block>
</body>
</html>
