<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title th:text="${pageTitle}">預設標題</title>

<th:block th:replace="~{./include/header :: headerContent}"></th:block>

<script th:inline="javascript">
/*<![CDATA[*/
    // 💡 確保 watchId 有正確從 Controller 傳入，否則會變為 -1
    var watchId = /*[[${watchId}]]*/ -1;
    var watch = null;

    $.fn.serializeObject = function () {
        var o = {};
        var a = this.serializeArray();
        $.each(a, function () {
            if (o[this.name]) {
                if (!o[this.name].push) o[this.name] = [o[this.name]];
                o[this.name].push(this.value || '');
            } else o[this.name] = this.value || '';
        });
        return o;
    };

    $(document).ready(function () {
        var token = $("meta[name='_csrf']").attr("content");
        var header = $("meta[name='_csrf_header']").attr("content");
        $(document).ajaxSend(function(e, xhr, options) {
            if (header && token) {
                xhr.setRequestHeader(header, token);
            }
        });

        if (watchId === -1) {
            console.error("Watch ID 遺失");
            return;
        }

        // 修改名稱
        $("#updateWatch").on("click", function () {
            var jsonObj = $('#watchForm').serializeObject();
            $.ajax({
                url: "/portfolio/watch/" + watchId,
                type: "PUT",
                contentType: "application/json; charset=utf-8",
                data: JSON.stringify(jsonObj),
                success: function (res) { 
                    if (Number(res.code) === 200) {
                        alert("名稱更新成功");
                        loadWatchList(); 
                    } else {
                        alert("更新失敗：" + res.message);
                    }
                }
            });
        });

        // 刪除股票
        $("#watchTable tbody").on("click", "button.deleteBtn", function () {
            var tstockId = $(this).closest('td').attr('tstock_id');
            if(confirm("確定移除？")) {
                $.ajax({
                    url: "/portfolio/watch/" + watchId + "/remove/" + tstockId,
                    type: "DELETE",
                    success: function (res) { 
                        if (Number(res.code) === 200) loadWatchList(); 
                    }
                });
            }
        });

        // 新增股票
        $("#tstockTable tbody").on("click", "button.addBtn", function () {
            var tstockId = $(this).closest('td').attr('tstock_id');
            var currentStocks = (watch && (watch.tStocks || watch.tstocks)) || [];
            var exists = currentStocks.some(function(s) { return s.id == tstockId; });
            
            if(exists) { alert('已在清單中'); return; }

            if(confirm("加入清單？")) {
                $.ajax({
                    url: "/portfolio/watch/" + watchId + "/add/" + tstockId,
                    type: "POST",
                    success: function (res) { 
                        if (Number(res.code) === 200) loadWatchList(); 
                    }
                });
            }
        });

        loadWatchList();
        loadTStockList();
    });

    function loadWatchList() {
        $.get("/portfolio/watch/" + watchId, function(res) {
            if (Number(res.code) === 200) {
                watch = res.data; 
                $("#watchForm #id").val(watch.id);
                $("#watchForm #name").val(watch.name);
                $("#watchTable tbody").empty();
                var list = watch.tStocks || watch.tstocks || [];
                list.forEach(function(item) {
                    var html = '<tr>' +
                        '<td>' + item.id + '</td>' +
                        '<td class="fw-bold">' + item.name + '</td>' +
                        '<td>' + item.symbol + '</td>' +
                        '<td>' + (item.classify ? item.classify.name : '-') + '</td>' +
                        '<td class="text-center" tstock_id="' + item.id + '">' +
                            '<button class="btn btn-outline-danger btn-sm deleteBtn">刪除</button>' +
                        '</td>' +
                        '</tr>';
                    $("#watchTable tbody").append(html);
                });
            }
        });
    }

    function loadTStockList() {
        $.get("/portfolio/tstock/", function(res) {
            if (Number(res.code) === 200) {
                $("#tstockTable tbody").empty();
                res.data.forEach(function(item) {
                    var html = '<tr>' +
                        '<td>' + item.id + '</td>' +
                        '<td>' + item.name + '</td>' +
                        '<td>' + item.symbol + '</td>' +
                        '<td>' + (item.classify ? item.classify.name : '-') + '</td>' +
                        '<td class="text-center" tstock_id="' + item.id + '">' +
                            '<button class="btn btn-outline-success btn-sm addBtn">新增</button>' +
                        '</td>' +
                        '</tr>';
                    $("#tstockTable tbody").append(html);
                });
            }
        });
    }
/*]]>*/
</script>
</head>
<body class="bg-light">

<th:block th:replace="~{./include/navbar :: navbar}"></th:block>

<div class="container pt-5 mt-4 pb-5">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3 fw-bold">
            <i class="bi bi-pencil-square me-2"></i>
            <span th:text="${pageTitle}">頁面標題</span>
        </h1>
        
        <div th:if="${currentUser != null}" class="text-secondary small">
            <i class="bi bi-person-fill me-1"></i>
            目前帳戶：<span class="text-primary fw-bold" th:text="${currentUser}">User</span>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-5">
        <div class="card-body p-4">
            <form id="watchForm">
                <div class="row g-3 align-items-end">
                    <div class="col-md-2">
                        <label class="form-label fw-bold small">ID</label>
                        <input id="id" name="id" readonly class="form-control bg-light"/>
                    </div>
                    <div class="col-md-7">
                        <label class="form-label fw-bold small">清單名稱</label>
                        <input id="name" name="name" class="form-control" />
                    </div>
                    <div class="col-md-3">
                        <button id="updateWatch" type="button" class="btn btn-info text-white w-100 fw-bold">更新名稱</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-primary text-white py-3">我的觀察股</div>
                <div class="table-responsive">
                    <table id="watchTable" class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>ID</th><th>名稱</th><th>代號</th><th>分類</th><th class="text-center">操作</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-success text-white py-3">股票資料庫</div>
                <div class="table-responsive">
                    <table id="tstockTable" class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr><th>ID</th><th>名稱</th><th>代號</th><th>分類</th><th class="text-center">操作</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:replace="~{./include/footer :: footer}"></th:block>
</body>
</html>
