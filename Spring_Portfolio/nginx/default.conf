server {
    listen 80;
    server_name ivan-test.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ivan-test.com;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # 改成 /portfolio，並在 proxy_pass 後面也帶上 /portfolio
    location /portfolio {
        #proxy_pass http://portfolio-app:8084/portfolio;
        proxy_pass http://portfolio-service:8084/portfolio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 增加緩衝區防止某些瀏覽器噴 400
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # 可選：如果有人只打 ivan_test.com，自動幫他轉到首頁
    location / {
        return 301 https://$host/portfolio/page/home;
    }
}