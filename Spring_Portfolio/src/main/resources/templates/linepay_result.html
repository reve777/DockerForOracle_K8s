<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>交易結果</title>
    <th:block th:replace="~{./include/header :: headerContent}"></th:block>
</head>
<body class="bg-light text-center">
    <th:block th:replace="~{./include/navbar :: navbar}"></th:block>
    <div class="container mt-5">
        <div class="card p-5">
            <h1 th:class="${status == 'success' ? 'text-success' : 'text-danger'}">
                <i th:class="${status == 'success' ? 'bi bi-check-circle' : 'bi bi-x-circle'}"></i>
                <span th:text="${message}"></span>
            </h1>
            <p class="mt-3">訂單編號：<strong th:text="${orderId}"></strong></p>
            <a href="/portfolio/page/linePay" class="btn btn-primary mt-3">回到首頁</a>
        </div>
    </div>
</body>
</html>
