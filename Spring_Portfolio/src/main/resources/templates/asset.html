<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Asset 我的資產</title>

    <th:block th:replace="~{./include/header :: headerContent}"></th:block>

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script th:inline="javascript">
    /*<![CDATA[*/
        // 取得當前登入者 ID
        var session_investor_id = /*[[${session.investor_id}]]*/ -1;

        $(document).ready(function () {
            // 1. CSRF 全域設定
            var token = $("meta[name='_csrf']").attr("content");
            var header = $("meta[name='_csrf_header']").attr("content");
            $(document).ajaxSend(function(e, xhr, options) {
                if (header && token) {
                    xhr.setRequestHeader(header, token);
                }
            });

            if (session_investor_id === -1) {
                alert("請先登入！");
                window.location.href = "/portfolio/loginpage";
                return;
            }

            // 2. 載入 Google Charts 並啟動初始更新
            google.charts.load('current', {'packages': ['corechart']});
            google.charts.setOnLoadCallback(update);

            // 3. 每 60 秒自動刷新報價與更新介面
            setInterval(refreshPrices, 60000);

            // 4. 綁定按鈕事件 (委派模式)
            $("#myTable").on("click", ".buyBtn", function() {
                orderAction("buy", $(this).closest('td').attr('tstock_id'), $(this));
            });

            $("#myTable").on("click", ".sellBtn", function() {
                orderAction("sell", $(this).closest('td').attr('po_id'), $(this));
            });
        });

        function refreshPrices() {
            $.get("/portfolio/price/refresh", function(res) {
                const response = (typeof res === 'string') ? JSON.parse(res) : res;
                if (Number(response.code) === 200) update(); 
            });
        }

		// 在 update 函式中
		function update() {
		    $.get("/portfolio/investor/" + session_investor_id, function (res) {
		        const response = (typeof res === 'string') ? JSON.parse(res) : res;
		        if (Number(response.code) === 200) {
		            const investor = response.data;
		            const balance = parseFloat(investor.balance) || 0; // 取得餘額
		            
		            $("#balance").text(numberFormat(balance));
		            const list = investor.portfolios || investor.tPortfolios || investor.tportfolios || [];
		            
		            table_list(list);
		            chart(list, balance); // <--- 修改這裡，多傳入 balance
		        }
		    });
		}


        function table_list(datas) {
            const tbody = $("#myTable tbody");
            tbody.empty();
            let asset_sum = 0;

            if (!datas || datas.length === 0) {
                tbody.append('<tr><td colspan="11" class="text-center text-muted py-5">目前尚無持股，趕快去交易吧！</td></tr>');
                $("#asset").text("0");
                return;
            }

            datas.forEach(item => {
                const stock = item.tStock || item.tstock;
                if (!stock) return;

                const currentPrice = parseFloat(stock.price) || 0;
                const cost = parseFloat(item.cost) || 0;
                const amount = parseInt(item.amount) || 0;
                const marketValue = currentPrice * amount;
                const profit = Math.round((currentPrice - cost) * amount);
                
                asset_sum += marketValue;
                const profitClass = profit >= 0 ? 'text-danger' : 'text-success';
                const classifyObj = stock.classify || stock.tClassify || stock.tclassify;

                const html = `
                <tr>
                    <td>${item.id}</td>
                    <td><span class="badge bg-light text-dark border">${classifyObj ? classifyObj.name : '未分類'}</span></td>
                    <td><code class="text-primary">${stock.symbol}</code></td>
                    <td class="fw-bold">${stock.name}</td>
                    <td class="text-end">${numberFormat(currentPrice)}</td>
                    <td class="text-end">${numberFormat(cost)}</td>
                    <td class="text-end">${numberFormat(amount)}</td>
                    <td class="${profitClass} fw-bold text-end">${profit > 0 ? '+' : ''}${numberFormat(profit)}</td>
                    <td class="small text-muted text-center">${item.date || '-'}</td>
                    <td class="text-center" po_id="${item.id}">
                        <button class="btn btn-outline-primary btn-sm sellBtn">賣出</button>
                    </td>
                    <td class="text-center" tstock_id="${stock.id}">
                        <button class="btn btn-outline-success btn-sm buyBtn">加碼</button>
                    </td>
                </tr>`;
                tbody.append(html);
            });
            $("#asset").text(numberFormat(asset_sum));
        }

        function orderAction(type, id, btn) {
            const amount = prompt(`請輸入${type === 'buy' ? '買進' : '賣出'}股數 (1000股為單位)？`, "1000");
            if (!amount) return; 
            const qty = parseInt(amount);
            if (qty % 1000 !== 0 || isNaN(qty) || qty <= 0) {
                alert('請輸入1000的倍數');
                return;
            }

            btn.prop('disabled', true); // 防止連點
            const url = `/portfolio/order/${type}/${id}/${qty}`;
            
            $.get(url, function(res) {
                const response = (typeof res === 'string') ? JSON.parse(res) : res;
                if (Number(response.code) === 200) {
                    alert('交易成功！');
                    update(); 
                } else {
                    alert('交易失敗: ' + response.message);
                }
            }).always(() => btn.prop('disabled', false));
        }

        function chart(portfolios) {
            if (!google.visualization || !portfolios || portfolios.length === 0) {
                $("#piechart_asset, #barchart_profit").html('<div class="text-center text-muted pt-5">暫無圖表數據</div>');
                return;
            }

            const assetMap = {};
            const profitDataArr = [ [ 'Stock', 'Profit', { role: 'style' } ] ];

            portfolios.forEach(item => {
                const stock = item.tStock || item.tstock;
                if(!stock) return;

                const classifyObj = stock.classify || stock.tClassify || stock.tclassify;
                const catName = classifyObj ? classifyObj.name : '未分類';
                const price = parseFloat(stock.price) || 0;
                const cost = parseFloat(item.cost) || 0;
                const amount = parseInt(item.amount) || 0;
                
                // 資產配置計算
                assetMap[catName] = (assetMap[catName] || 0) + (price * amount);
                
                // 損益計算
                const profit = (price - cost) * amount;
                profitDataArr.push([stock.name, profit, profit >= 0 ? '#dc3545' : '#198754']);
            });

            // 繪製資產配置圖
            const assetDataArr = [ [ 'Category', 'Value' ] ];
            for (let key in assetMap) assetDataArr.push([key, assetMap[key]]);
            
            new google.visualization.PieChart(document.getElementById('piechart_asset')).draw(
                google.visualization.arrayToDataTable(assetDataArr), 
                { title: '資產配置比例 (按類別)', pieHole: 0.4, chartArea: { width: '90%', height: '80%' } }
            );

            // 繪製損益圖
            new google.visualization.BarChart(document.getElementById('barchart_profit')).draw(
                google.visualization.arrayToDataTable(profitDataArr), 
                { title: '個股累計損益', legend: { position: 'none' }, chartArea: { width: '70%', height: '80%' } }
            );
        }

        function numberFormat(n) {
            return n != null ? Math.round(n).toLocaleString('zh-TW') : '0';
        }
    /*]]>*/
    </script>
</head>
<body class="bg-light">

    <th:block th:replace="~{./include/navbar :: navbar}"></th:block>

    <div class="container pt-5 mt-4 pb-5">
        <div class="row mb-4 g-3">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-primary text-white">
                    <div class="card-body p-4">
                        <h6 class="text-white-50 text-uppercase fw-bold small">總資產市值 (TWD)</h6>
                        <h1 class="display-6 fw-bold mb-0">$<span id="asset">0</span></h1>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-0 shadow-sm bg-dark text-white">
                    <div class="card-body p-4">
                        <h6 class="text-white-50 text-uppercase fw-bold small">帳戶可用餘額</h6>
                        <h1 class="display-6 fw-bold mb-0">$<span id="balance">0</span></h1>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-5">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0 fw-bold"><i class="bi bi-briefcase me-2"></i>我的投資組合</h5>
                <button onclick="update()" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-clockwise"></i> 手動刷新
                </button>
            </div>
            <div class="table-responsive">
                <table id="myTable" class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th><th>分類</th><th>代號</th><th>名稱</th><th class="text-end">現價</th>
                            <th class="text-end">成本</th><th class="text-end">股數</th><th class="text-end">損益</th>
                            <th class="text-center">更新日期</th><th class="text-center">操作</th><th class="text-center">加碼</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="11" class="text-center py-4">資料載入中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm p-3">
                    <div id="piechart_asset" style="height:350px;"></div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm p-3">
                    <div id="barchart_profit" style="height:350px;"></div>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{./include/footer :: footer}"></th:block>

</body>
</html>
