<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Investor 投資人</title>

<!-- header fragment -->
<th:block th:replace="~{./include/header :: headerContent}"></th:block>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script th:inline="javascript">
/*<![CDATA[*/

// 將表單轉成 JSON 物件
$.fn.serializeObject = function () {
    var o = {};
    var a = this.serializeArray();
    $.each(a, function () {
        if (o[this.name]) {
            if (!o[this.name].push) o[this.name] = [o[this.name]];
            o[this.name].push(this.value || '');
        } else {
            if($(this).attr('type') === 'checkbox') {
                o[this.name] = $(this).is(':checked');
            } else {
                o[this.name] = this.value || '';
            }
        }
    });
    return o;
};

// 從後端 Controller 傳入的 session investor id
var session_investor_id = /*[[${investorIdFromSession}]]*/ null;

$(document).ready(function () {

    // 點擊表格列讀取資料
    $("#myTable").on("click", "tr", function () {
        var id = $(this).find('td').eq(0).text().trim();
        if (!id) return;

        $.get("/portfolio/investor/" + id, function (data) {
            $('#myform').trigger("reset");
            $('#add').attr('disabled', true);
            $('#upt').attr('disabled', false);
            $('#del').attr('disabled', false);

            $("#id").val(data.id);
            $("#username").val(data.username);
            $("#email").val(data.email);
            $("#balance").val(data.balance);
        });
    });

    // 新增
    $("#add").on("click", function () {
        var jsonObj = $('#myform').serializeObject();
        $.ajax({
            url: "/portfolio/investor/",
            type: "POST",
            contentType: "application/json; charset=utf-8",
            data: JSON.stringify(jsonObj),
            success: function () { initPageSetup(); },
            error: function(e){ console.error(e); alert("新增失敗"); }
        });
    });

    // 修改
    $("#upt").on("click", function () {
        var jsonObj = $('#myform').serializeObject();
        $.ajax({
            url: "/portfolio/investor/" + jsonObj.id,
            type: "PUT",
            contentType: "application/json; charset=utf-8",
            data: JSON.stringify(jsonObj),
            success: function () { initPageSetup(); },
            error: function(e){ console.error(e); alert("修改失敗"); }
        });
    });

    // 刪除
    $("#del").on("click", function () {
        var id = $("#id").val();
        $.ajax({
            url: "/portfolio/investor/" + id,
            type: "DELETE",
            success: function () { initPageSetup(); },
            error: function(e){ console.error(e); alert("刪除失敗"); }
        });
    });

    // 重置
    $("#rst").on("click", function() { initPageSetup(); });

    // 登入按鈕
    $("#myTable").on("click", "tr td button.login-btn", function(e) {
        e.stopPropagation();
        var investor_id = $(this).attr('data-investor-id');
        window.location.href = '/portfolio/page/investor?investor_id=' + investor_id;
    });

    // 初始化頁面
    initPageSetup();
});

function initPageSetup() {
    $('#myform').trigger("reset");
    $('#add').attr('disabled', false);
    $('#upt').attr('disabled', true);
    $('#del').attr('disabled', true);
    table_list();
}

function table_list() {
    $.get("/portfolio/investor/", function (datas) {
        $("#myTable tbody").empty();
        $.each(datas, function (i, item) {
            var loginBtn = '';
            if(session_investor_id != item.id) {
				console.log("session_investor_id === " ,session_investor_id);
				console.log("item.id === " ,item.id)
                loginBtn = '<button type="button" class="btn btn-success login-btn" data-investor-id="' + item.id + '">登入</button>';
            }
            var html = '<tr>' +
                '<td>' + item.id + '</td>' +
                '<td>' + item.username + '</td>' +
                '<td>' + item.email + '</td>' +
                '<td>' + item.balance + '</td>' +
                '<td>' + loginBtn + '</td>' +
                '</tr>';
            $("#myTable tbody").append(html);
        });
    });
}

/*]]>*/
</script>
</head>
<body>

<!-- navbar -->
<th:block th:replace="~{./include/navbar :: navbar}"></th:block>

<div class="container mt-5">
    <h1 class="mb-4"><img width="40" th:src="@{/images/user.png}"/> Investor 投資人</h1>

    <form id="myform">
        <div class="mb-3 row">
            <label for="id" class="col-sm-2 col-form-label">ID</label>
            <div class="col-sm-2">
                <input id="id" name="id" readonly class="form-control"/>
            </div>
        </div>

        <div class="mb-3 row">
            <label for="username" class="col-sm-2 col-form-label">投資人帳號</label>
            <div class="col-sm-10">
                <input type="text" id="username" name="username" class="form-control"/>
            </div>
        </div>

        <div class="mb-3 row">
            <label for="email" class="col-sm-2 col-form-label">投資人電郵</label>
            <div class="col-sm-10">
                <input type="email" id="email" name="email" class="form-control"/>
            </div>
        </div>

        <div class="mb-3 row">
            <label for="balance" class="col-sm-2 col-form-label">可用資金</label>
            <div class="col-sm-10">
                <input type="number" id="balance" name="balance" class="form-control"/>
            </div>
        </div>

        <div class="mb-3 row">
            <div class="col-sm-10 offset-sm-2">
                <button id="add" type="button" class="btn btn-success">新增</button>
                <button id="upt" type="button" class="btn btn-info">修改</button>
                <button id="del" type="button" class="btn btn-danger">刪除</button>
                <button id="rst" type="button" class="btn btn-warning">重置</button>
            </div>
        </div>
    </form>

    <h2 class="mt-5"><img width="40" th:src="@{/images/user.png}"/> Investor 投資人列表</h2>

    <div class="table-responsive">
        <table id="myTable" class="table table-striped table-hover table-bordered">
            <thead class="table-light">
                <tr>
                    <th>id</th>
                    <th>username</th>
                    <th>email</th>
                    <th>balance</th>
                    <th>login</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<!-- footer -->
<th:block th:replace="~{./include/footer :: footer}"></th:block>

</body>
</html>
