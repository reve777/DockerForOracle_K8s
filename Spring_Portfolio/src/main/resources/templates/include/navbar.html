	<!-- ========================
         ✅【重點修改 ②】
         ❌ 完全移除 iframe
         原因：Spring Security 預設 X-Frame-Options: DENY
         ======================== -->

	<!-- ========================
         前端 JS 區
         ======================== -->
	<script th:inline="javascript">
		/*<![CDATA[*/

		// ---------- sessionStorage ----------
		var username = /*[[${username}]]*/ null;
		var investorId = /*[[${investorId}]]*/ null;
		var watchId = /*[[${watchId}]]*/ null;

		if (username && investorId) {
			sessionStorage.setItem('username', username);
			sessionStorage.setItem('investorId', investorId);
			sessionStorage.setItem('watchId', watchId);
		}

		// ---------- ✅【重點修改 ③】
		// 用 fetch 呼叫後端 /price/refresh
		function refreshPrices() {
			fetch("/portfolio/price/refresh")
				.then(res => {
					if (!res.ok) throw new Error("更新報價失敗");
					return res.json();
				})
				.then(data => {
					console.log("即時報價更新成功", data);

					// 🔔 你可以在這裡：
					// 1. 更新 table
					// 2. 發送 event
					// 3. 存入 sessionStorage
				})
				.catch(err => {
					console.error(err);
					alert("更新報價失敗，請稍後再試");
				});
		}

		/*]]>*/
	</script>
